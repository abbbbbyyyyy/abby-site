<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #050508;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Big bold white blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    background: #ffffff;
  }

  .blob-1 {
    width: 500px;
    height: 500px;
    filter: blur(100px);
    opacity: 0.5;
    top: -200px;
    right: -100px;
  }

  .blob-2 {
    width: 450px;
    height: 450px;
    filter: blur(90px);
    opacity: 0.4;
    bottom: -180px;
    left: -80px;
  }

  .blob-3 {
    width: 350px;
    height: 400px;
    filter: blur(80px);
    opacity: 0.25;
    top: 40%;
    left: 15%;
  }

  .blob-4 {
    width: 300px;
    height: 300px;
    filter: blur(70px);
    opacity: 0.35;
    bottom: -60px;
    right: 20%;
  }

  .blob-5 {
    width: 200px;
    height: 200px;
    filter: blur(50px);
    opacity: 0.6;
    top: 30%;
    right: 10%;
  }

  /* Text */
  .text {
    position: relative;
    z-index: 3;
    text-align: center;
  }

  .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 88px;
    text-transform: lowercase;
    color: #ffffff;
    letter-spacing: -0.02em;
    line-height: 1;
    text-shadow: 0 0 40px rgba(0,0,0,0.9), 0 0 80px rgba(0,0,0,0.7);
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
  <div class="text">
    <div class="title">abbyschneider.nyc</div>
  </div>
</body>
</html>
